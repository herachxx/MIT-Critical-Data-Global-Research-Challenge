<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="30" fill="#0f1c38" stroke="#1b3f8b" stroke-width="1.5"/>
  <!-- Inner gold ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#c49a2f" stroke-width="1" opacity="0.6"/>
  <!-- Blue star body -->
  <polygon points="32,8 37,22 52,22 40,31 44.5,46 32,37.5 19.5,46 24,31 12,22 27,22"
    fill="#1b3f8b"/>
  <!-- Gold star overlay (smaller, offset) -->
  <polygon points="32,13 36,24 48,24 38.5,31 42,43 32,36.5 22,43 25.5,31 16,24 28,24"
    fill="#c49a2f" opacity="0.7"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3.5" fill="#ffffff" opacity="0.9"/>
</svg>
