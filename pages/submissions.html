<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Submissions — ISRC 2026</title>
<link rel="icon" href="../icon.svg" type="image/svg+xml"/>
<link rel="stylesheet" href="../css/style.css"/>
<style>
body { background: var(--cream); }
.wrap { max-width: 900px; margin: 0 auto; padding: 100px 32px 60px; }

.page-title { margin-bottom: 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.page-title h1 { font-size: 36px; }

.sub-card {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: var(--r); padding: 26px 28px; margin-bottom: 16px;
  transition: box-shadow .2s;
}
.sub-card:hover { box-shadow: var(--shadow); }
.sub-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; margin-bottom: 10px; }
.sub-card h3  { font-size: 20px; color: var(--ink); margin-bottom: 4px; }
.sub-card .meta { font-size: 12px; color: var(--muted); }
.sub-card .abstract-preview { font-size: 13px; color: var(--muted); line-height: 1.7; margin-top: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.sub-card-foot { display: flex; align-items: center; gap: 10px; margin-top: 14px; flex-wrap: wrap; }

.empty-state {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: var(--r); padding: 64px 40px; text-align: center;
}
.empty-state svg { width: 48px; height: 48px; color: var(--border); margin-bottom: 16px; }
.empty-state h3  { font-size: 24px; margin-bottom: 8px; }
.empty-state p   { color: var(--muted); font-size: 15px; margin-bottom: 22px; }
</style>
</head>
<body>
<div id="nav-slot"></div>

<div class="wrap">
  <div class="page-title">
    <h1>My Submissions</h1>
    <a href="submit.html" class="btn btn-navy">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Submission
    </a>
  </div>

  <div id="subs-container"></div>
</div>

<script src="../js/app.js"></script>
<script>
  const u = requireAuth();
  if (u) {
    renderDashNav('Submissions');
    renderSubs(u);
  }

  function renderSubs(u) {
    const container = document.getElementById('subs-container');
    const subs = u.submissions || [];

    if (!subs.length) {
      container.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <h3>No submissions yet</h3>
          <p>Submit your first research project to ISRC 2026.</p>
          <a href="submit.html" class="btn btn-navy">Submit Research</a>
        </div>`;
      return;
    }

    container.innerHTML = subs.slice().reverse().map(s => {
      const statusColor = { Submitted:'tag-navy', 'Under Review':'tag-gold', Accepted:'tag-green', Rejected:'tag-red' }[s.status] || 'tag-navy';
      return `
        <div class="sub-card">
          <div class="sub-card-top">
            <div>
              <h3>${s.title}</h3>
              <div class="meta">${s.track} · ${s.type} · Submitted ${s.date}</div>
            </div>
            <span class="tag ${statusColor}">${s.status}</span>
          </div>
          ${s.abstract ? `<div class="abstract-preview">${s.abstract}</div>` : ''}
          <div class="sub-card-foot">
            <span class="tag tag-navy" style="font-size:10px">${s.id}</span>
            ${s.keywords ? `<span style="font-size:12px;color:var(--muted)">${s.keywords}</span>` : ''}
          </div>
        </div>`;
    }).join('');
  }
</script>
</body>
</html>
