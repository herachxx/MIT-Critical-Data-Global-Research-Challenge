<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Competition Registration — ISRC 2026</title>
<link rel="icon" href="../icon.svg" type="image/svg+xml"/>
<link rel="stylesheet" href="../css/style.css"/>
<style>
body { background: var(--cream); min-height: 100vh; display: flex; flex-direction: column; }
.auth-layout { flex:1; display:flex; align-items:center; justify-content:center; padding:100px 24px 60px; }
.auth-box {
  background: var(--white); border-radius: var(--r); border: 1.5px solid var(--border);
  box-shadow: var(--shadow); padding: 44px; width: 100%; max-width: 500px;
}
.auth-box h2 { font-size: 30px; margin-bottom: 6px; }
.auth-box .sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
.step-indicator { display:flex; align-items:center; gap:0; margin-bottom:28px; }
.step { flex:1; text-align:center; font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; padding:9px 0; border-radius:var(--r); color:var(--muted); background:var(--cream); border:1.5px solid var(--border); }
.step.active { background:var(--navy); color:var(--white); border-color:var(--navy); }
.step.done   { background:var(--cream); color:var(--navy); border-color:var(--navy); }
.step-line   { width:24px; height:1.5px; background:var(--border); flex-shrink:0; }
</style>
</head>
<body>
<div id="nav-slot"></div>

<div class="auth-layout">
  <div class="auth-box">
    <div class="step-indicator">
      <div class="step done">1 · Create Account</div>
      <div class="step-line"></div>
      <div class="step active">2 · Registration</div>
      <div class="step-line"></div>
      <div class="step">3 · Payment</div>
    </div>

    <h2>Competition Details</h2>
    <p class="sub">Signed in as <strong id="user-name-display">—</strong>. Complete your competition profile.</p>

    <div id="cr-msg" class="alert"></div>

    <div class="field">
      <div class="field-row">
        <div>
          <label>Country</label>
          <select id="cr-co">
            <option value="">Select…</option>
            <option>Argentina</option><option>Australia</option><option>Austria</option>
            <option>Bangladesh</option><option>Belgium</option><option>Brazil</option>
            <option>Canada</option><option>China</option><option>Colombia</option>
            <option>Denmark</option><option>Egypt</option><option>Finland</option>
            <option>France</option><option>Germany</option><option>Ghana</option>
            <option>Greece</option><option>India</option><option>Indonesia</option>
            <option>Iran</option><option>Ireland</option><option>Israel</option>
            <option>Italy</option><option>Japan</option><option>Kazakhstan</option>
            <option>Kenya</option><option>Malaysia</option><option>Mexico</option>
            <option>Morocco</option><option>Netherlands</option><option>New Zealand</option>
            <option>Nigeria</option><option>Norway</option><option>Pakistan</option>
            <option>Philippines</option><option>Poland</option><option>Portugal</option>
            <option>Romania</option><option>Russia</option><option>Saudi Arabia</option>
            <option>Singapore</option><option>South Africa</option><option>South Korea</option>
            <option>Spain</option><option>Sweden</option><option>Switzerland</option>
            <option>Thailand</option><option>Turkey</option><option>Ukraine</option>
            <option>United Kingdom</option><option>United States</option>
            <option>Vietnam</option><option>Other</option>
          </select>
        </div>
        <div>
          <label>Academic Level</label>
          <select id="cr-lvl">
            <option value="">Select…</option>
            <option>Undergraduate (Year 2)</option>
            <option>Undergraduate (Year 3)</option>
            <option>Undergraduate (Year 4)</option>
            <option>Master's Student</option>
            <option>PhD (Year 1)</option>
            <option>PhD (Year 2)</option>
          </select>
        </div>
      </div>
    </div>
    <div class="field">
      <label>Research Track</label>
      <select id="cr-tr">
        <option value="">Select your primary track…</option>
        <option>Life Sciences & Biotechnology</option>
        <option>Physical Sciences & Mathematics</option>
        <option>Computer Science & AI</option>
        <option>Social Sciences & Economics</option>
        <option>Environmental & Earth Sciences</option>
        <option>Engineering & Applied Sciences</option>
        <option>Medicine & Public Health</option>
        <option>Humanities & Arts</option>
      </select>
    </div>
    <div class="field"><label>Faculty Supervisor (full name)</label><input type="text" id="cr-sup" placeholder="Prof. Jane Smith"/></div>
    <div class="field"><label>Supervisor Email</label><input type="email" id="cr-sup-em" placeholder="j.smith@university.edu"/></div>
    <div class="field">
      <label>Tentative Research Title</label>
      <input type="text" id="cr-title" placeholder="e.g. Neural correlates of working memory under cognitive load"/>
    </div>

    <button class="btn btn-navy btn-full" onclick="doCompReg()">Save & Continue to Payment</button>
    <p style="text-align:center;font-size:12px;color:var(--muted);margin-top:14px">
      You can update these details later from your dashboard.
    </p>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
  const u = requireAuth('competition-reg.html');
  if (u) {
    renderPublicNav('', '../');
    document.getElementById('user-name-display').textContent = u.fname + ' ' + u.lname;
    /* pre-fill if already set */
    if (u.country) document.getElementById('cr-co').value   = u.country;
    if (u.level)   document.getElementById('cr-lvl').value  = u.level;
    if (u.track)   document.getElementById('cr-tr').value   = u.track;
    if (u.sup)     document.getElementById('cr-sup').value  = u.sup;
    if (u.supEmail)document.getElementById('cr-sup-em').value = u.supEmail;
    if (u.resTitle)document.getElementById('cr-title').value  = u.resTitle;
  }

  function doCompReg() {
    const co    = document.getElementById('cr-co').value;
    const lvl   = document.getElementById('cr-lvl').value;
    const tr    = document.getElementById('cr-tr').value;
    const sup   = document.getElementById('cr-sup').value.trim();
    const supEm = document.getElementById('cr-sup-em').value.trim();
    const title = document.getElementById('cr-title').value.trim();
    const msg   = document.getElementById('cr-msg');
    const show  = (t,m) => { msg.className='alert show alert-'+t; msg.textContent=m; };

    if (!co||!lvl||!tr||!sup||!supEm) return show('err','Please complete all required fields.');

    const me = DB.getUser();
    const users = DB.getUsers();
    const idx = users.findIndex(u => u.email === me.email);

    const trackCode = tr.split(' ')[0].slice(0,2).toUpperCase();
    const num = me.certId?.split('-')[3] || String(Math.floor(Math.random()*90000)+10000);
    me.country = co; me.level = lvl; me.track = tr;
    me.sup = sup; me.supEmail = supEm; me.resTitle = title;
    me.certId = `ISRC-2026-${trackCode}-${num}`;

    if (idx >= 0) users[idx] = me;
    DB.saveUsers(users);
    DB.saveUser(me);

    show('ok', 'Registration saved! Redirecting to payment…');
    setTimeout(() => location.href = 'payment.html', 900);
  }
</script>
</body>
</html>
