<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Create Account — ISRC 2026</title>
<link rel="icon" href="../icon.svg" type="image/svg+xml"/>
<link rel="stylesheet" href="../css/style.css"/>
<style>
body { background: var(--cream); min-height: 100vh; display: flex; flex-direction: column; }
.auth-layout {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 100px 24px 60px;
}
.auth-box {
  background: var(--white); border-radius: var(--r);
  border: 1.5px solid var(--border); box-shadow: var(--shadow);
  padding: 44px; width: 100%; max-width: 480px;
}
.auth-logo {
  display: flex; align-items: center; gap: 10px; margin-bottom: 32px;
  text-decoration: none;
}
.auth-logo svg { width: 36px; height: 36px; }
.auth-logo span { font-family: var(--ff-h); font-size: 18px; color: var(--ink); }
.auth-box h2 { font-size: 30px; margin-bottom: 6px; }
.auth-box .sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
.auth-box .sub a { color: var(--navy); font-weight: 600; }
.step-indicator {
  display: flex; align-items: center; gap: 0; margin-bottom: 28px;
}
.step {
  flex: 1; text-align: center; font-size: 11px; font-weight: 600;
  letter-spacing: .06em; text-transform: uppercase; padding: 9px 0;
  border-radius: var(--r); color: var(--muted); background: var(--cream);
  border: 1.5px solid var(--border); position: relative;
}
.step.active { background: var(--navy); color: var(--white); border-color: var(--navy); }
.step.done   { background: var(--cream); color: var(--navy); border-color: var(--navy); }
.step-line   { width: 24px; height: 1.5px; background: var(--border); flex-shrink: 0; }
</style>
</head>
<body>
<div id="nav-slot"></div>

<div class="auth-layout">
  <div class="auth-box">

    <a href="../index.html" class="auth-logo">
      <svg viewBox="0 0 44 44" fill="none">
        <circle cx="22" cy="22" r="20" fill="#1C2B5A"/>
        <circle cx="22" cy="22" r="14" fill="none" stroke="#B8882A" stroke-width="1" opacity=".7"/>
        <polygon points="22,7 26,17.5 37.5,17.5 28.5,24 31.5,35 22,28.5 12.5,35 15.5,24 6.5,17.5 18,17.5" fill="#ffffff" opacity=".95"/>
        <polygon points="22,11 25,19 34,19 27,24.5 29.5,33 22,28 14.5,33 17,24.5 10,19 19,19" fill="#B8882A" opacity=".85"/>
      </svg>
      <span>ISRC 2026</span>
    </a>

    <div class="step-indicator">
      <div class="step active" id="step1">1 · Create Account</div>
      <div class="step-line"></div>
      <div class="step" id="step2">2 · Registration</div>
      <div class="step-line"></div>
      <div class="step" id="step3">3 · Payment</div>
    </div>

    <h2>Create Account</h2>
    <p class="sub">Already registered? <a href="login.html">Sign in →</a></p>

    <div id="reg-msg" class="alert"></div>

    <div class="field">
      <div class="field-row">
        <div><label>First name</label><input type="text" id="r-fn" placeholder="Emma"/></div>
        <div><label>Last name</label><input type="text" id="r-ln" placeholder="Schmidt"/></div>
      </div>
    </div>
    <div class="field"><label>Email address</label><input type="email" id="r-em" placeholder="emma@university.edu"/></div>
    <div class="field"><label>Institution</label><input type="text" id="r-in" placeholder="University of Cambridge"/></div>
    <div class="field">
      <div class="field-row">
        <div><label>Password</label><input type="password" id="r-pw" placeholder="Min 8 characters"/></div>
        <div><label>Confirm</label><input type="password" id="r-pw2" placeholder="Repeat password"/></div>
      </div>
    </div>

    <button class="btn btn-navy btn-full" onclick="doRegister()">Create Account & Continue</button>
    <p style="text-align:center;font-size:12px;color:var(--muted);margin-top:14px">
      Next step: Competition Registration — country, track, and details.
    </p>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
  /* If already logged in, skip to registration */
  if (DB.getUser()) location.href = 'competition-reg.html';

  renderPublicNav('', '../');

  function doRegister() {
    const fn = document.getElementById('r-fn').value.trim();
    const ln = document.getElementById('r-ln').value.trim();
    const em = document.getElementById('r-em').value.trim();
    const inst = document.getElementById('r-in').value.trim();
    const pw  = document.getElementById('r-pw').value;
    const pw2 = document.getElementById('r-pw2').value;
    const msg = document.getElementById('reg-msg');

    const show = (t,m) => { msg.className='alert show alert-'+t; msg.textContent=m; };

    if (!fn||!ln||!em||!inst||!pw) return show('err','Please complete all fields.');
    if (pw.length < 8)              return show('err','Password must be at least 8 characters.');
    if (pw !== pw2)                 return show('err','Passwords do not match.');
    const users = DB.getUsers();
    if (users.find(u => u.email === em)) return show('err','An account with this email already exists.');

    const code = 'SC';
    const num  = String(Math.floor(Math.random()*90000)+10000);
    const u = { fname:fn, lname:ln, email:em, inst, pass:pw, paid:false, certId:`ISRC-2026-${code}-${num}`, submissions:[] };
    users.push(u);
    DB.saveUsers(users);
    DB.saveUser(u);

    show('ok', 'Account created! Redirecting to competition registration…');
    setTimeout(() => location.href = 'competition-reg.html', 900);
  }
</script>
</body>
</html>
